name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 120

    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKGRS_DYNAMIC: 0
      RUST_BACKTRACE: 1
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install LLVM (libclang)
        shell: pwsh
        run: |
          choco install llvm -y --no-progress
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PATH=C:\Program Files\LLVM\bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Configure vcpkg binary cache
        shell: pwsh
        run: |
          echo "VCPKG_DEFAULT_TRIPLET=x64-windows-static" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "VCPKG_FEATURE_FLAGS=manifests,binarycaching" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "VCPKG_BINARY_SOURCES=clear;files,C:\vcpkg_cache,readwrite" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          New-Item -ItemType Directory -Force -Path C:\vcpkg_cache | Out-Null

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target
        uses: actions/cache@v4
        with:
          path: |
            target
            C:\vcpkg_cache
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock', 'vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Install vcpkg dependencies (manifest mode)
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg.exe install --triplet x64-windows-static

      - name: Build RustDesk (release)
        shell: pwsh
        run: |
          cargo build --release --verbose

      - name: Show release folder
        shell: pwsh
        run: |
          Get-ChildItem -Path target\release -File | Select-Object Name,Length

      - name: Upload built EXE files
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-release
          path: |
            target/release/*.exe
            target/release/*.dll
          if-no-files-found: warn
