name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Set environment variables
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "VCPKGRS_DYNAMIC=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "RUST_BACKTRACE=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install dependencies
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg.exe install --triplet x64-windows-static

      - name: Install LLVM
        shell: pwsh
        run: |
          choco install llvm -y

      - name: Set LIBCLANG_PATH
        shell: pwsh
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build RustDesk
        shell: pwsh
        run: |
          cargo build --release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-release
          path: target/release/*.exe
