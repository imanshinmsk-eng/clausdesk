name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "rustdesktop" ]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Install CMake
        shell: pwsh
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
      
      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          }
          # Добавляем vcpkg в PATH
          echo "C:\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Setup environment variables
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=C:\vcpkg"
          Add-Content $env:GITHUB_ENV "VCPKGRS_DYNAMIC=0"
          Add-Content $env:GITHUB_ENV "RUST_BACKTRACE=1"
          Add-Content $env:GITHUB_ENV "RUSTFLAGS=-C target-feature=+crt-static"
          Add-Content $env:GITHUB_ENV "VCPKG_FEATURE_FLAGS=versions"
      
      - name: Create vcpkg.json if not exists
        shell: pwsh
        run: |
          if (-not (Test-Path "vcpkg.json")) {
            @'
      {
        "name": "rustdesk",
        "version": "1.0",
        "dependencies": [
          "libvpx",
          "opus",
          "aom",
          "libyuv",
          "sdl2",
          "ffmpeg",
          "portaudio"
        ],
        "builtin-baseline": "e0d5e3b6f6e3c5c9e6f6b6e6c5c9e6f6b6e6c5c9"
      }
      '@ | Out-File -FilePath "vcpkg.json" -Encoding utf8
          }
      
      - name: Install vcpkg packages with specific versions
        shell: pwsh
        run: |
          # Устанавливаем конкретные версии пакетов
          C:\vcpkg\vcpkg.exe install libvpx:x64-windows-static --recurse
          C:\vcpkg\vcpkg.exe install opus:x64-windows-static --recurse
          C:\vcpkg\vcpkg.exe install libyuv:x64-windows-static --recurse
          C:\vcpkg\vcpkg.exe install sdl2:x64-windows-static --recurse
          C:\vcpkg\vcpkg.exe install portaudio:x64-windows-static --recurse
      
      - name: Install FFmpeg with specific configuration
        shell: pwsh
        run: |
          # Устанавливаем FFmpeg с минимальными опциями
          C:\vcpkg\vcpkg.exe install ffmpeg[core,avcodec,avformat,swscale,avutil]:x64-windows-static --recurse
      
      - name: Install LLVM
        shell: pwsh
        run: |
          choco install llvm -y
          $llvmPath = "C:\Program Files\LLVM\bin"
          Add-Content $env:GITHUB_PATH $llvmPath
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=$llvmPath"
      
      - name: Build RustDesk
        shell: pwsh
        run: |
          # Отключаем aom и vpx кодеки если они вызывают проблемы
          cargo build --release --target x86_64-pc-windows-msvc --features flutter --no-default-features
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: target/x86_64-pc-windows-msvc/release/rustdesk.exe
          retention-days: 30
