name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "rustdesktop" ]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Setup vcpkg
        shell: pwsh
        run: |
          # Проверяем, установлен ли vcpkg
          if (-not (Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          } else {
            Write-Host "vcpkg already installed"
          }
      
      - name: Setup environment variables
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=C:\vcpkg"
          Add-Content $env:GITHUB_ENV "VCPKGRS_DYNAMIC=0"
          Add-Content $env:GITHUB_ENV "RUST_BACKTRACE=1"
          Add-Content $env:GITHUB_ENV "RUSTFLAGS=-C target-feature=+crt-static"
          Add-Content $env:GITHUB_ENV "VCPKG_KEEP_ENV_VARS=1"
      
      - name: Install vcpkg packages (manifest mode)
        shell: pwsh
        run: |
          # В manifest mode просто запускаем vcpkg install без аргументов
          # vcpkg сам прочитает зависимости из vcpkg.json
          C:\vcpkg\vcpkg.exe install --triplet x64-windows-static
      
      - name: Install LLVM and Clang
        shell: pwsh
        run: |
          # Устанавливаем LLVM через winget
          winget install LLVM.LLVM --accept-package-agreements --accept-source-agreements
          
          $llvmPath = "C:\Program Files\LLVM\bin"
          Add-Content $env:GITHUB_PATH $llvmPath
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=$llvmPath"
      
      - name: Build RustDesk
        shell: pwsh
        run: |
          # Сборка с оптимизациями для Windows
          cargo build --release --target x86_64-pc-windows-msvc --features flutter
      
      - name: Prepare artifacts
        shell: pwsh
        run: |
          # Создаем папку для артефактов
          New-Item -ItemType Directory -Force -Path artifacts
          
          # Ищем и копируем exe файлы
          $exePaths = @(
            "target\x86_64-pc-windows-msvc\release\rustdesk.exe",
            "target\release\rustdesk.exe"
          )
          
          foreach ($exePath in $exePaths) {
            if (Test-Path $exePath) {
              Copy-Item $exePath "artifacts\" -Force
              Write-Host "Found and copied: $exePath"
            }
          }
          
          # Создаем информацию о сборке
          $buildInfo = @"
Build Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
Rust Version: $(rustc --version)
Target: x86_64-pc-windows-msvc
Custom Server: 109.173.21.183
Build Number: ${{ github.run_number }}
"@
          $buildInfo | Out-File -FilePath "artifacts\build_info.txt" -Encoding utf8
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: artifacts/
          retention-days: 30
