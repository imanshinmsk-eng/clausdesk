name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "rustdesktop" ]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install NASM
        shell: pwsh
        run: |
          winget install NASM.NASM --accept-package-agreements --accept-source-agreements
          $nasmPath = "C:\Program Files\NASM"
          Add-Content $env:GITHUB_PATH $nasmPath
      
      - name: Remove vcpkg.json temporarily
        shell: pwsh
        run: |
          if (Test-Path "vcpkg.json") {
            Move-Item "vcpkg.json" "vcpkg.json.bak"
            Write-Host "Temporarily renamed vcpkg.json"
          }
      
      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          }
      
      - name: Setup environment variables
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=C:\vcpkg"
          Add-Content $env:GITHUB_ENV "VCPKGRS_DYNAMIC=0"
          Add-Content $env:GITHUB_ENV "RUSTFLAGS=-C target-feature=+crt-static"
      
      - name: Install vcpkg packages
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg.exe install libvpx:x64-windows-static
          C:\vcpkg\vcpkg.exe install opus:x64-windows-static
          C:\vcpkg\vcpkg.exe install aom:x64-windows-static
          C:\vcpkg\vcpkg.exe install libyuv:x64-windows-static
          C:\vcpkg\vcpkg.exe install sdl2:x64-windows-static
          C:\vcpkg\vcpkg.exe install ffmpeg:x64-windows-static
          C:\vcpkg\vcpkg.exe install portaudio:x64-windows-static
      
      - name: Restore vcpkg.json
        shell: pwsh
        run: |
          if (Test-Path "vcpkg.json.bak") {
            Move-Item "vcpkg.json.bak" "vcpkg.json" -Force
          }
      
      - name: Install LLVM
        shell: pwsh
        run: |
          winget install LLVM.LLVM --accept-package-agreements --accept-source-agreements
          $llvmPath = "C:\Program Files\LLVM\bin"
          Add-Content $env:GITHUB_PATH $llvmPath
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=$llvmPath"
      
      - name: Build RustDesk
        shell: pwsh
        run: cargo build --release --target x86_64-pc-windows-msvc --features flutter
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: target/x86_64-pc-windows-msvc/release/rustdesk.exe
          retention-days: 30
