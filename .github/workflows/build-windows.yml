name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "rustdesktop" ]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Setup vcpkg (classic mode)
        shell: pwsh
        run: |
          # Временно переименовываем vcpkg.json для классического режима
          if (Test-Path "vcpkg.json") {
            Move-Item "vcpkg.json" "vcpkg.json.bak"
            Write-Host "Temporarily renamed vcpkg.json to vcpkg.json.bak"
          }
          
          # Устанавливаем vcpkg
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
      
      - name: Install vcpkg packages (classic mode)
        shell: pwsh
        run: |
          # Устанавливаем пакеты по отдельности
          C:\vcpkg\vcpkg.exe install libvpx:x64-windows-static
          C:\vcpkg\vcpkg.exe install opus:x64-windows-static
          C:\vcpkg\vcpkg.exe install aom:x64-windows-static
          C:\vcpkg\vcpkg.exe install libyuv:x64-windows-static
          C:\vcpkg\vcpkg.exe install sdl2:x64-windows-static
          C:\vcpkg\vcpkg.exe install ffmpeg:x64-windows-static
          C:\vcpkg\vcpkg.exe install portaudio:x64-windows-static
      
      - name: Restore vcpkg.json
        shell: pwsh
        run: |
          if (Test-Path "vcpkg.json.bak") {
            Move-Item "vcpkg.json.bak" "vcpkg.json" -Force
            Write-Host "Restored vcpkg.json"
          }
      
      - name: Setup environment variables
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=C:\vcpkg"
          Add-Content $env:GITHUB_ENV "VCPKGRS_DYNAMIC=0"
          Add-Content $env:GITHUB_ENV "RUST_BACKTRACE=1"
          Add-Content $env:GITHUB_ENV "RUSTFLAGS=-C target-feature=+crt-static"
          Add-Content $env:GITHUB_PATH "C:\vcpkg\installed\x64-windows-static\bin"
      
      - name: Install LLVM
        shell: pwsh
        run: |
          winget install LLVM.LLVM --accept-package-agreements --accept-source-agreements
          $llvmPath = "C:\Program Files\LLVM\bin"
          Add-Content $env:GITHUB_PATH $llvmPath
          Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=$llvmPath"
      
      - name: Build RustDesk
        shell: pwsh
        run: |
          cargo build --release --target x86_64-pc-windows-msvc --features flutter
      
      - name: Prepare artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts
          
          if (Test-Path "target\x86_64-pc-windows-msvc\release\rustdesk.exe") {
            Copy-Item "target\x86_64-pc-windows-msvc\release\rustdesk.exe" "artifacts\" -Force
          }
          
          $buildInfo = @"
Build Date: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
Rust Version: $(rustc --version)
Target: x86_64-pc-windows-msvc
Custom Server: 109.173.21.183
Build Number: ${{ github.run_number }}
"@
          $buildInfo | Out-File -FilePath "artifacts\build_info.txt" -Encoding utf8
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: artifacts/
          retention-days: 30
