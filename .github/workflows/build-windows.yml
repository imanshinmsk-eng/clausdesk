name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "rustdesktop" ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Install dependencies
        shell: pwsh
        run: |
          choco install nasm cmake llvm -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "C:\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Add-Content $env:GITHUB_ENV "VCPKG_ROOT=C:\vcpkg"
      
      - name: Install vcpkg packages
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg.exe install libvpx:x64-windows-static opus:x64-windows-static libyuv:x64-windows-static sdl2:x64-windows-static portaudio:x64-windows-static
          C:\vcpkg\vcpkg.exe install ffmpeg[core]:x64-windows-static
      
      - name: Build
        shell: pwsh
        run: |
          $env:RUSTFLAGS = "-C target-feature=+crt-static"
          cargo build --release --target x86_64-pc-windows-msvc --features flutter
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-exe
          path: target/x86_64-pc-windows-msvc/release/rustdesk.exe
