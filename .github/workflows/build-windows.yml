name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master", "rustdesktop" ]

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install NASM
        shell: pwsh
        run: |
          choco install nasm -y
          echo "C:\Program Files\NASM" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Install CMake
        shell: pwsh
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
      
      - name: Temporarily rename vcpkg.json
        shell: pwsh
        run: |
          if (Test-Path "vcpkg.json") {
            Move-Item "vcpkg.json" "vcpkg.json.bak"
            Write-Host "Renamed vcpkg.json to vcpkg.json.bak"
          }
      
      - name: Setup vcpkg
        shell: pwsh
        run: |
          if (-not (Test-Path "C:\vcpkg")) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            C:\vcpkg\bootstrap-vcpkg.bat
          }
          echo "C:\vcpkg" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Set environment variables
        shell: pwsh
        run: |
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "VCPKGRS_DYNAMIC=0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "RUST_BACKTRACE=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "RUSTFLAGS=-C target-feature=+crt-static" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      
      - name: Install vcpkg packages (classic mode)
        shell: pwsh
        run: |
          # Используем --classic чтобы обойти manifest mode
          C:\vcpkg\vcpkg.exe install --classic opus:x64-windows-static
          C:\vcpkg\vcpkg.exe install --classic libvpx:x64-windows-static
          C:\vcpkg\vcpkg.exe install --classic aom:x64-windows-static
          C:\vcpkg\vcpkg.exe install --classic libyuv:x64-windows-static
          C:\vcpkg\vcpkg.exe install --classic sdl2:x64-windows-static
          C:\vcpkg\vcpkg.exe install --classic ffmpeg:x64-windows-static
          C:\vcpkg\vcpkg.exe install --classic portaudio:x64-windows-static
      
      - name: Restore vcpkg.json
        shell: pwsh
        run: |
          if (Test-Path "vcpkg.json.bak") {
            Move-Item "vcpkg.json.bak" "vcpkg.json" -Force
            Write-Host "Restored vcpkg.json"
          }
      
      - name: Install LLVM
        shell: pwsh
        run: |
          choco install llvm -y
          $llvmPath = "C:\Program Files\LLVM\bin"
          echo $llvmPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBCLANG_PATH=$llvmPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      
      - name: Build RustDesk
        shell: pwsh
        run: |
          # Проверяем переменные
          Write-Host "VCPKG_ROOT = $env:VCPKG_ROOT"
          Write-Host "RUSTFLAGS = $env:RUSTFLAGS"
          
          # Сборка
          cargo build --release --target x86_64-pc-windows-msvc --features flutter
          
          # Проверяем результат
          Get-ChildItem -Path target -Recurse -Filter *.exe | ForEach-Object {
            Write-Host "Found EXE: $($_.FullName)"
          }
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-x64
          path: target/x86_64-pc-windows-msvc/release/rustdesk.exe
          retention-days: 30
          if-no-files-found: warn
